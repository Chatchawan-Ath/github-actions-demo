name: CI Pipeline

on:
  push:
    branches: [ main, develop ]   # ทำงานเมื่อ push ขึ้น main หรือ develop
  pull_request:
    branches: [ main ]            # ทำงานเมื่อเปิด PR เข้า main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest        # ใช้ VM Ubuntu ของ GitHub

    strategy:
      matrix:
        node-version: [18.x, 20.x]  # ทดสอบทั้ง 2 version พร้อมกัน

    steps:
      - name: Checkout code
        uses: actions/checkout@v4       # ดึง code จาก repo มาใน VM

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'                  # cache node_modules เพื่อความเร็ว

      - name: Install dependencies
        run: npm ci                     # ci ดีกว่า install สำหรับ CI/CD

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage